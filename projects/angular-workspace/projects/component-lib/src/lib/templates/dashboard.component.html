<div class="dashboard" [class.collapsed]="sidebarCollapsed()">
  <particle-sidebar [appTitle]="appTitle()" [collapsed]="sidebarCollapsed()">
    <particle-sidebar-nav [items]="navItems()" [collapsed]="sidebarCollapsed()" />
  </particle-sidebar>

  <div class="main-content">
    <header class="header">
      <div class="header-left">
        <button class="menu-toggle" (click)="toggleSidebar()" aria-label="Toggle menu">
          <particle-icon name="menu" size="medium" />
        </button>
      </div>
      <div class="header-right">
        <button
          class="theme-toggle"
          (click)="toggleTheme()"
          [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          @if (isDark()) {
            <particle-icon name="sun" size="medium" />
          } @else {
            <particle-icon name="moon" size="medium" />
          }
        </button>
        <div class="user-menu">
          <span class="user-initials">{{ userInitials() }}</span>
          @if (userName()) {
            <span class="user-name">{{ userName() }}</span>
          }
        </div>
      </div>
    </header>

    <main class="content">
      <ng-content></ng-content>
    </main>
  </div>
</div>

<div class="dashboard" [class.collapsed]="sidebarCollapsed()">
  @if (!isMobile()) {
    <particle-sidebar
      [appTitle]="appTitle()"
      [collapsed]="sidebarCollapsed()"
      [isMobile]="false"
      (toggle)="toggleSidebar()"
    >
      <particle-nav-list [items]="navItems()" [collapsed]="sidebarCollapsed()" />
    </particle-sidebar>
  }

  @if (isMobile() && mobileSidebarOpen()) {
    <div class="mobile-sidebar-overlay" (click)="closeMobileSidebar()">
      <div class="mobile-sidebar" (click)="$event.stopPropagation()">
        <particle-sidebar
          [appTitle]="appTitle()"
          [collapsed]="false"
          [isMobile]="true"
          (toggle)="closeMobileSidebar()"
        >
          <particle-nav-list [items]="navItems()" [collapsed]="false" />
        </particle-sidebar>
      </div>
    </div>
  }

  <div class="main-content" [class.mobile]="isMobile()">
    <header class="header">
      <div class="header-left">
        @if (isMobile()) {
          <button class="menu-toggle" (click)="toggleSidebar()" aria-label="Toggle menu">
            <particle-icon name="menu" size="medium" />
          </button>
        }
      </div>
      <div class="header-right">
        <button
          class="theme-toggle"
          (click)="toggleTheme()"
          [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          @if (isDark()) {
            <particle-icon name="sun" size="medium" />
          } @else {
            <particle-icon name="moon" size="medium" />
          }
        </button>
        <div class="user-menu">
          <span class="user-initials">{{ userInitials() }}</span>
        </div>
      </div>
    </header>

    <main class="content">
      <ng-content></ng-content>
    </main>
  </div>
</div>
